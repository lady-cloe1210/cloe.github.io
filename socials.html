<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Nodes</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #0a0a0a;
    color: #ff6a00;
    font-family: 'Courier New', monospace;
}

.page-wrapper {
    border: 6px solid #ff6a00;
    border-radius: 30px;
    margin: 20px;
    padding: 40px 20px 60px 20px;
}

/* Header */

.header {
    text-align: center;
    margin-bottom: 50px;
}

.header h1 {
    font-size: 2.5rem;
    letter-spacing: 4px;
}

.header h2 {
    font-size: 1rem;
    font-weight: normal;
    opacity: 0.8;
    margin-top: 8px;
}

/* Social Node Container */

.social-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* Individual Node */

.social-node {
    display: flex;
    align-items: center;
    gap: 25px;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.social-node.visible {
    opacity: 1;
    transform: translateY(0);
}

/* Logo Image */

.social-node img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    border: 3px solid #ff6a00;
    border-radius: 12px;
    padding: 10px;
    background: #111;
}

/* Button */

.social-button {
    flex: 1;
    text-align: center;
    padding: 18px;
    border: 3px solid #ff6a00;
    color: #ff6a00;
    text-decoration: none;
    font-size: 1rem;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    display: inline-block;
}

.social-button:hover {
    background: #ff6a00;
    color: #0a0a0a;
    transform: scale(1.02);
}

/* Responsive */

@media (max-width: 600px) {
    .social-node {
        flex-direction: column;
        text-align: center;
    }

    .social-button {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="page-wrapper">

    <div class="header">
        <h1>SOCIAL NODES</h1>
        <h2>External Timeline Access Points</h2>
    </div>

    <div class="social-container">

        <!-- Spotify -->
        <div class="social-node">
            <img src="music.png" alt="Spotify Logo">
            <a class="social-button" href="https://open.spotify.com/user/1wkymgbftb2o7es2pbw81c58l?si=dc1b7ef543f84c3b" target="_blank">
                SPOTIFY NODE
            </a>
        </div>

        <!-- TikTok -->
        <div class="social-node">
            <img src="tiktok.png" alt="TikTok Logo">
            <a class="social-button" href="https://www.tiktok.com/@clorissaengland" target="_blank">
                TIKTOK NODE
            </a>
        </div>

        <!-- Instagram -->
        <div class="social-node">
            <img src="instagram.png" alt="Instagram Logo">
            <a class="social-button" href="https://www.instagram.com/chicks_1210" target="_blank">
                INSTAGRAM NODE
            </a>
        </div>

        <!-- Facebook -->
        <div class="social-node">
            <img src="facebook.png" alt="Facebook Logo">
            <a class="social-button" href="https://facebook.com/cloe.england" target="_blank">
                FACEBOOK NODE
            </a>
        </div>

        <!-- LinkedIn -->
        <div class="social-node">
            <img src="linkedin.png" alt="LinkedIn Logo">
            <a class="social-button" href="https://www.linkedin.com/in/clorissa-hicks-51564129" target="_blank">
                LINKEDIN NODE
            </a>
        </div>

    </div>

</div>

<script>
/* Fade-in on scroll */
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
        }
    });
}, { threshold: 0.2 });

document.querySelectorAll('.social-node').forEach(node => {
    observer.observe(node);
});
</script>

</body>
</html>
