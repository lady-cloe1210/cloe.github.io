<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRANCH ANALYSIS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000000;
    font-family: 'Orbitron', sans-serif;
    color: #ff6a00;
    overflow-x: hidden;
}

/* Main Screen */
.screen {
    position: relative;
    padding: 120px 20px 60px;
    border: 8px solid #ff6a00;
    overflow: hidden; /* prevents images escaping border */
}

/* Grid */
.screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,106,0,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,106,0,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
}

/* Header */
.header {
    position: absolute;
    top: 30px;
    left: 30px;
    z-index: 2;
}

.header h1 {
    font-size: 1.3rem;
    letter-spacing: 3px;
}

.subtext {
    font-size: 0.75rem;
    opacity: 0.7;
}

/* Timeline */
.timeline {
    position: relative;
    max-width: 900px; /* narrower so it fits comfortably */
    margin: auto;
    z-index: 2;
}

/* Centered Wavy Line */
.branch-line {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    height: 100%;
    width: 50px;
    pointer-events: none;
}

.branch-line path {
    stroke: #ff6a00;
    stroke-width: 3;
    fill: none;
    filter: drop-shadow(0 0 6px #ff6a00);
}

/* Timeline Row */
.timeline-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 90px 0;
}

/* Items */
.timeline-item {
    width: 32%; /* smaller */
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.timeline-item.show {
    opacity: 1;
    transform: translateY(0);
}

.timeline-item img {
    width: 100%;
    max-width: 280px; /* keeps photos from getting huge */
    display: block;
    margin: auto;
    border: 2px solid #ff6a00;
}

.caption {
    margin-top: 8px;
    font-size: 0.7rem;
    text-align: center;
    opacity: 0.8;
}

/* Mobile */
@media(max-width: 768px) {

    .timeline {
        max-width: 100%;
    }

    .branch-line {
        left: 20px;
        transform: none;
    }

    .timeline-row {
        flex-direction: column;
        align-items: flex-start;
        margin: 60px 0;
    }

    .timeline-item {
        width: 100%;
        margin-left: 60px;
    }

    .timeline-item img {
        max-width: 220px;
    }
}
</style>
</head>

<body>

<div class="screen">

<div class="header">
    <h1>BRANCH ANALYSIS</h1>
    <div class="subtext">MONITORING VARIANT ACTIVITY</div>
</div>

<div class="timeline">

<svg class="branch-line" viewBox="0 0 100 6000" preserveAspectRatio="none">
<path d="M50 0 Q70 200 50 400 T50 800 T50 1200 T50 1600 T50 2000
         T50 2400 T50 2800 T50 3200 T50 3600 T50 4000
         T50 4400 T50 4800 T50 5200 T50 5600 T50 6000"/>
</svg>

<!-- Alternating rows -->
<div class="timeline-row">
<div class="timeline-item"><img src="IMG_9321.jpeg"><div class="caption">Temporal Archive Entry.</div></div>
<div></div>
</div>

<div class="timeline-row">
<div></div>
<div class="timeline-item"><img src="IMG_0489.jpeg"><div class="caption">Nexus variance detected.</div></div>
</div>

<div class="timeline-row">
<div class="timeline-item"><img src="DSC_1095.jpeg"><div class="caption">Multiversal anomaly.</div></div>
<div></div>
</div>

<div class="timeline-row">
<div></div>
<div class="timeline-item"><img src="IMG_2906.jpeg"><div class="caption">Branch escalation logged.</div></div>
</div>

<!-- (continue alternating exactly as before for remaining images) -->

</div>
</div>

<script>
const items = document.querySelectorAll('.timeline-item');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

items.forEach(item => observer.observe(item));
</script>

</body>
</html>
